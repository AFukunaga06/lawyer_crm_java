# ===== デフォルト: H2インメモリDB（すぐ起動・検証用） =====
spring.datasource.url=jdbc:h2:mem:lawyercrm;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# H2コンソール（開発用）: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
spring.thymeleaf.cache=false

# ===== 本番MySQL用プロファイル =====
# 起動: java -jar lawyer-crm.jar --spring.profiles.active=mysql
# 既存PHP版と同じDB(lawyer_crm)/ユーザー(lawyer_user)を流用可能。
# ただしJava版はテーブルに tenant_id 列を要求するため、既存テーブルとは
# スキーマが異なる。新規DB(例: lawyer_crm_java)での利用を推奨。
