<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head((${legalCase.id} != null ? '編集' : '新規') + ' | ' + ${vertical.brand})}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/nav :: sidebar('cases')}"></div>
        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
            <h1 class="h3 mb-4" th:text="${vertical.caseLabel} + (${legalCase.id} != null ? ' を編集' : ' を新規登録')">登録</h1>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/cases/save}" method="post" th:object="${legalCase}">
                        <input type="hidden" th:field="*{id}">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label" th:text="${vertical.caseLabel} + '名'">案件名</label>
                                <span class="text-danger">*</span>
                                <input type="text" class="form-control" th:field="*{caseName}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">番号</label>
                                <input type="text" class="form-control" th:field="*{caseNumber}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" th:text="${vertical.clientLabel}">依頼者</label>
                                <span class="text-danger">*</span>
                                <select class="form-select" th:field="*{clientId}" required>
                                    <option value="">選択してください</option>
                                    <option th:each="cl : ${clients}" th:value="${cl.id}" th:text="${cl.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">種別</label>
                                <select class="form-select" th:field="*{caseType}">
                                    <option th:each="entry : ${vertical.caseTypes}"
                                            th:value="${entry.key}" th:text="${entry.value}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">状態</label>
                                <select class="form-select" th:field="*{status}">
                                    <option th:each="s : ${T(com.fukunaga.lawyercrm.entity.LegalCase.Status).values()}"
                                            th:value="${s}" th:text="${s}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">担当</label>
                                <select class="form-select" th:field="*{assignedLawyerId}">
                                    <option value="">未割当</option>
                                    <option th:each="u : ${lawyers}" th:value="${u.id}" th:text="${u.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">受任日</label>
                                <input type="date" class="form-control" th:field="*{openedDate}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">終了日</label>
                                <input type="date" class="form-control" th:field="*{closedDate}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">裁判所</label>
                                <input type="text" class="form-control" th:field="*{courtName}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">相手方</label>
                                <input type="text" class="form-control" th:field="*{opponent}">
                            </div>
                            <div class="col-12">
                                <label class="form-label">メモ</label>
                                <textarea class="form-control" rows="3" th:field="*{memo}"></textarea>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button class="btn btn-primary" type="submit">保存</button>
                            <a class="btn btn-outline-secondary" href="/cases">キャンセル</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
