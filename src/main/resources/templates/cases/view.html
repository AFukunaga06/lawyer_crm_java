<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${legalCase.caseName} + ' | ' + ${vertical.brand})}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/nav :: sidebar('cases')}"></div>
        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/cases" th:text="${vertical.caseLabel}">案件</a></li>
                    <li class="breadcrumb-item active" th:text="${legalCase.caseName}">案件名</li>
                </ol>
            </nav>
            <div th:if="${flash}" class="alert alert-success py-2" th:text="${flash}"></div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h1 class="h3 mb-1" th:text="${legalCase.caseName}">案件名</h1>
                    <span class="badge bg-secondary" th:text="${vertical.caseTypeLabel(legalCase.caseType)}">種別</span>
                    <span class="badge bg-light text-dark border" th:text="${legalCase.status}">状態</span>
                    <span class="text-muted small ms-2" th:if="${legalCase.caseNumber}" th:text="'No. ' + ${legalCase.caseNumber}"></span>
                </div>
                <a class="btn btn-outline-secondary btn-sm" th:href="@{'/cases/' + ${legalCase.id} + '/edit'}">
                    <i class="bi bi-pencil"></i> 編集</a>
            </div>

            <div class="row g-3">
                <div class="col-lg-4">
                    <div class="card shadow-sm mb-3">
                        <div class="card-header bg-white fw-bold">案件情報</div>
                        <table class="table mb-0">
                            <tr><th class="text-muted" style="width:40%" th:text="${vertical.clientLabel}">依頼者</th>
                                <td><a th:if="${client}" th:href="@{'/clients/' + ${client.id}}" th:text="${client.name}"></a></td></tr>
                            <tr><th class="text-muted">裁判所</th><td th:text="${legalCase.courtName}"></td></tr>
                            <tr><th class="text-muted">相手方</th><td th:text="${legalCase.opponent}"></td></tr>
                            <tr><th class="text-muted">受任日</th><td th:text="${legalCase.openedDate}"></td></tr>
                            <tr><th class="text-muted">メモ</th><td style="white-space:pre-wrap" th:text="${legalCase.memo}"></td></tr>
                        </table>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-header bg-white fw-bold">請求</div>
                        <div class="card-body">
                            <form th:action="@{/billing/save}" method="post" class="row g-2 mb-3">
                                <input type="hidden" name="caseId" th:value="${legalCase.id}">
                                <div class="col-5">
                                    <select name="billingType" class="form-select form-select-sm">
                                        <option value="retainer">着手金</option>
                                        <option value="success">報酬金</option>
                                        <option value="hourly">時間制</option>
                                        <option value="expense">実費</option>
                                        <option value="other">その他</option>
                                    </select>
                                </div>
                                <div class="col-7">
                                    <input type="number" name="amount" class="form-control form-control-sm" placeholder="金額" required>
                                </div>
                                <div class="col-12">
                                    <input type="text" name="title" class="form-control form-control-sm" placeholder="名目">
                                </div>
                                <div class="col-12 text-end">
                                    <button class="btn btn-sm btn-primary" type="submit">請求を追加</button>
                                </div>
                            </form>
                            <ul class="list-group list-group-flush">
                                <li th:each="b : ${billings}" class="list-group-item d-flex justify-content-between align-items-center">
                                    <span>
                                        <span class="badge bg-secondary" th:text="${b.billingType}"></span>
                                        <span th:text="${b.title}"></span>
                                        <span class="fw-bold" th:text="'¥' + ${#numbers.formatInteger(b.amount, 1, 'COMMA')}"></span>
                                    </span>
                                    <form th:action="@{'/billing/' + ${b.id} + '/toggle-paid'}" method="post">
                                        <input type="hidden" name="caseId" th:value="${legalCase.id}">
                                        <button class="btn btn-sm" th:classappend="${b.paid}?'btn-success':'btn-outline-secondary'"
                                                type="submit" th:text="${b.paid}?'入金済':'未入金'"></button>
                                    </form>
                                </li>
                                <li th:if="${billings.isEmpty()}" class="list-group-item text-muted">請求はありません。</li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card shadow-sm mb-3">
                        <div class="card-header bg-white fw-bold"><i class="bi bi-calendar-check me-1"></i> 期日</div>
                        <div class="card-body">
                            <form th:action="@{/deadlines/save}" method="post" class="row g-2 mb-3">
                                <input type="hidden" name="caseId" th:value="${legalCase.id}">
                                <div class="col-md-4">
                                    <input type="text" name="title" class="form-control form-control-sm" placeholder="期日名" required>
                                </div>
                                <div class="col-md-4">
                                    <input type="datetime-local" name="deadlineDate" class="form-control form-control-sm" required>
                                </div>
                                <div class="col-md-2">
                                    <select name="deadlineType" class="form-select form-select-sm">
                                        <option value="court">期日</option>
                                        <option value="document">書類</option>
                                        <option value="meeting">面談</option>
                                        <option value="payment">支払</option>
                                        <option value="other">その他</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <button class="btn btn-sm btn-primary w-100" type="submit">追加</button>
                                </div>
                            </form>
                            <ul class="list-group list-group-flush">
                                <li th:each="d : ${deadlines}" class="list-group-item d-flex justify-content-between align-items-center"
                                    th:classappend="${d.done}?'text-muted text-decoration-line-through':''">
                                    <span>
                                        <span class="badge bg-info text-dark" th:text="${d.deadlineType}"></span>
                                        <span th:text="${d.title}"></span>
                                        <span class="text-muted small ms-2" th:text="${#temporals.format(d.deadlineDate, 'yyyy/MM/dd HH:mm')}"></span>
                                    </span>
                                    <form th:action="@{'/deadlines/' + ${d.id} + '/toggle'}" method="post">
                                        <input type="hidden" name="back" th:value="'/cases/' + ${legalCase.id}">
                                        <button class="btn btn-sm" th:classappend="${d.done}?'btn-success':'btn-outline-secondary'"
                                                type="submit" th:text="${d.done}?'完了':'未完了'"></button>
                                    </form>
                                </li>
                                <li th:if="${deadlines.isEmpty()}" class="list-group-item text-muted">期日はありません。</li>
                            </ul>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-header bg-white fw-bold"><i class="bi bi-clock-history me-1"></i> 活動記録</div>
                        <div class="card-body">
                            <form th:action="@{/activities/save}" method="post" class="row g-2 mb-3">
                                <input type="hidden" name="clientId" th:value="${legalCase.clientId}">
                                <input type="hidden" name="caseId" th:value="${legalCase.id}">
                                <div class="col-md-3">
                                    <select name="activityType" class="form-select form-select-sm">
                                        <option value="phone">電話</option>
                                        <option value="meeting">面談</option>
                                        <option value="email">メール</option>
                                        <option value="document">書類</option>
                                        <option value="court">出廷</option>
                                        <option value="other">その他</option>
                                    </select>
                                </div>
                                <div class="col-md-5">
                                    <input type="datetime-local" name="activityAt" class="form-control form-control-sm" required>
                                </div>
                                <div class="col-md-4">
                                    <input type="text" name="title" class="form-control form-control-sm" placeholder="件名">
                                </div>
                                <div class="col-12">
                                    <textarea name="content" class="form-control form-control-sm" rows="2" placeholder="内容"></textarea>
                                </div>
                                <div class="col-12 text-end">
                                    <button class="btn btn-sm btn-primary" type="submit">記録を追加</button>
                                </div>
                            </form>
                            <ul class="list-group list-group-flush">
                                <li th:each="a : ${activities}" class="list-group-item">
                                    <div class="d-flex justify-content-between">
                                        <span><span class="badge bg-secondary" th:text="${a.activityType}"></span>
                                            <span th:text="${a.title}"></span></span>
                                        <span class="text-muted small" th:text="${#temporals.format(a.activityAt, 'yyyy/MM/dd HH:mm')}"></span>
                                    </div>
                                    <div class="small text-muted mt-1" style="white-space:pre-wrap" th:text="${a.content}"></div>
                                </li>
                                <li th:if="${activities.isEmpty()}" class="list-group-item text-muted">活動記録はありません。</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
