<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(${vertical.clientLabel} + '一覧 | ' + ${vertical.brand})}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/nav :: sidebar('clients')}"></div>
        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0" th:text="${vertical.clientLabel} + '一覧'">依頼者一覧</h1>
                <a class="btn btn-primary" href="/clients/new">
                    <i class="bi bi-plus-lg me-1"></i><span th:text="${vertical.clientLabel} + 'を追加'">追加</span></a>
            </div>
            <div th:if="${flash}" class="alert alert-success py-2" th:text="${flash}"></div>

            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                        <tr>
                            <th>氏名</th><th>カナ</th><th>連絡先</th><th>状態</th><th>登録日</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${clients}">
                            <td><a th:href="@{'/clients/' + ${c.id}}" th:text="${c.name}">名前</a></td>
                            <td th:text="${c.kana}">カナ</td>
                            <td>
                                <div th:if="${c.tel}" class="small"><i class="bi bi-telephone me-1"></i><span th:text="${c.tel}"></span></div>
                                <div th:if="${c.email}" class="small text-muted" th:text="${c.email}"></div>
                            </td>
                            <td><span class="badge bg-light text-dark border" th:text="${c.status}">active</span></td>
                            <td class="text-muted small" th:text="${#temporals.format(c.createdAt, 'yyyy/MM/dd')}">日付</td>
                        </tr>
                        <tr th:if="${clients.isEmpty()}">
                            <td colspan="5" class="text-center text-muted py-4">まだ登録がありません。</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
