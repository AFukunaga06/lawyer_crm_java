<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('ダッシュボード | ' + ${vertical.brand})}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/nav :: sidebar('dashboard')}"></div>
        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
            <h1 class="h3 mb-4">ダッシュボード</h1>
            <div th:if="${flash}" class="alert alert-success py-2" th:text="${flash}"></div>

            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body">
                            <div class="text-muted small" th:text="${vertical.clientLabel}">依頼者</div>
                            <div class="fs-2 fw-bold" th:text="${clientCount}">0</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body">
                            <div class="text-muted small" th:text="${vertical.caseLabel + '（総数）'}">案件</div>
                            <div class="fs-2 fw-bold" th:text="${caseCount}">0</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card shadow-sm">
                        <div class="card-body">
                            <div class="text-muted small" th:text="${'進行中' + vertical.caseLabel}">進行中案件</div>
                            <div class="fs-2 fw-bold text-primary" th:text="${activeCaseCount}">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-lg-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white fw-bold">
                            <i class="bi bi-calendar-check me-1"></i> 直近の期日（30日以内）</div>
                        <ul class="list-group list-group-flush">
                            <li th:each="d : ${upcomingDeadlines}" class="list-group-item d-flex justify-content-between">
                                <span>
                                    <a th:href="@{'/cases/' + ${d.caseId}}" th:text="${d.title}">期日</a>
                                </span>
                                <span class="text-muted small"
                                      th:text="${#temporals.format(d.deadlineDate, 'yyyy/MM/dd HH:mm')}">日時</span>
                            </li>
                            <li th:if="${upcomingDeadlines.isEmpty()}" class="list-group-item text-muted">
                                直近の期日はありません。</li>
                        </ul>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white fw-bold">
                            <i class="bi bi-clock-history me-1"></i> 最近の活動記録</div>
                        <ul class="list-group list-group-flush">
                            <li th:each="a : ${recentActivities}" class="list-group-item">
                                <span class="badge bg-secondary" th:text="${a.activityType}">type</span>
                                <span th:text="${a.title}">タイトル</span>
                                <span class="text-muted small float-end"
                                      th:text="${#temporals.format(a.activityAt, 'MM/dd HH:mm')}">日時</span>
                            </li>
                            <li th:if="${recentActivities.isEmpty()}" class="list-group-item text-muted">
                                活動記録はありません。</li>
                        </ul>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
