<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('期日管理 | ' + ${vertical.brand})}"></head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{fragments/nav :: sidebar('deadlines')}"></div>
        <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4 py-4">
            <h1 class="h3 mb-4">期日管理（未完了）</h1>
            <div th:if="${flash}" class="alert alert-success py-2" th:text="${flash}"></div>

            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                        <tr><th>期日日時</th><th>種別</th><th>件名</th><th>案件</th><th></th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="d : ${deadlines}">
                            <td class="fw-bold" th:text="${#temporals.format(d.deadlineDate, 'yyyy/MM/dd HH:mm')}">日時</td>
                            <td><span class="badge bg-info text-dark" th:text="${d.deadlineType}">種別</span></td>
                            <td th:text="${d.title}">件名</td>
                            <td><a th:href="@{'/cases/' + ${d.caseId}}" th:text="${caseNames.get(d.caseId)}">案件</a></td>
                            <td class="text-end">
                                <form th:action="@{'/deadlines/' + ${d.id} + '/toggle'}" method="post">
                                    <input type="hidden" name="back" value="/deadlines">
                                    <button class="btn btn-sm btn-outline-success" type="submit">完了にする</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${deadlines.isEmpty()}">
                            <td colspan="5" class="text-center text-muted py-4">未完了の期日はありません。</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
