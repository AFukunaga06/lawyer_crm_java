<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">法務CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background:#f5f6f8; }
        .sidebar { min-height:100vh; background:#1f2937; }
        .sidebar a { color:#cbd5e1; text-decoration:none; }
        .sidebar a:hover, .sidebar a.active { color:#fff; background:#374151; }
        .sidebar .nav-link { border-radius:.4rem; margin:.1rem .4rem; }
        .brand { color:#fff; font-weight:700; }
        .stat-card { border:none; border-radius:.75rem; }
        .table thead th { font-size:.85rem; color:#6b7280; }
    </style>
</head>
<body></body>
</html>
