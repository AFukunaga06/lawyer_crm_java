<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="sidebar(active)" class="sidebar col-md-3 col-lg-2 d-md-block p-0">
    <div class="p-3">
        <div class="brand fs-5" th:text="${vertical != null ? vertical.brand : 'LegalDesk'}">LegalDesk</div>
        <div class="text-secondary small" th:text="${vertical != null ? vertical.sub : ''}">サブ</div>
    </div>
    <ul class="nav flex-column px-1">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active=='dashboard'}?'active'" href="/">
                <i class="bi bi-speedometer2 me-1"></i> ダッシュボード</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active=='clients'}?'active'" href="/clients">
                <i class="bi bi-people-fill me-1"></i>
                <span th:text="${(vertical != null ? vertical.clientLabel : '依頼者')}">依頼者</span></a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active=='cases'}?'active'" href="/cases">
                <i class="bi bi-folder-fill me-1"></i>
                <span th:text="${(vertical != null ? vertical.caseLabel : '案件')}">案件</span></a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${active=='deadlines'}?'active'" href="/deadlines">
                <i class="bi bi-calendar-check-fill me-1"></i> 期日管理</a>
        </li>
    </ul>
    <hr class="text-secondary mx-3">
    <div class="px-3 pb-3">
        <div class="text-secondary small mb-1">
            <i class="bi bi-building me-1"></i><span th:text="${tenant != null ? tenant.name : ''}">事務所</span>
        </div>
        <div class="text-light small mb-2">
            <i class="bi bi-person-circle me-1"></i><span th:text="${currentUserName}">ユーザー</span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-sm btn-outline-light w-100" type="submit">
                <i class="bi bi-box-arrow-right me-1"></i> ログアウト</button>
        </form>
    </div>
</nav>
</body>
</html>
