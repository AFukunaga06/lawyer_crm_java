<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('ログイン | 法務CRM')}"></head>
<body class="d-flex align-items-center" style="min-height:100vh;background:#1f2937;">
<div class="container" style="max-width:400px;">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h1 class="h4 text-center mb-1">法務CRM</h1>
            <p class="text-center text-muted small mb-4">LegalDesk / TaxDesk / JudicialDesk / AdminDesk</p>

            <div th:if="${param.error}" class="alert alert-danger py-2">
                ログインIDまたはパスワードが正しくありません。
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2">
                ログアウトしました。
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">ログインID</label>
                    <input type="text" name="login_id" class="form-control" autofocus required>
                </div>
                <div class="mb-3">
                    <label class="form-label">パスワード</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">ログイン</button>
            </form>
            <p class="text-muted small mt-3 mb-0">
                初期管理者: <code>admin</code> / <code>admin123</code>
            </p>
        </div>
    </div>
</div>
</body>
</html>
